<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Catálogo de Productos</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><style>body{background:#f6f7fb}.producto{border:0;border-radius:18px;overflow:hidden;box-shadow:0 12px 30px rgba(31,41,55,.09)}.imagen{height:150px;display:grid;place-items:center;font-size:3rem;background:linear-gradient(135deg,#e0e7ff,#f3e8ff)}</style></head><body><main class="container py-5"><div class="text-center mb-5"><h1>Catálogo de Productos</h1><p class="text-secondary">Proyecto de la Clase 8 realizado con Bootstrap y JavaScript.</p></div><div class="row g-4" id="productos"></div><div class="text-center mt-4"><button class="btn btn-primary" id="mostrar" type="button">Mostrar más productos</button><a class="btn btn-outline-secondary ms-2" href="../../index.html#proyectos">Volver al portafolio</a></div></main><script>const datos=[['Auriculares','Gs. 150.000','🎧'],['Teclado','Gs. 220.000','⌨️'],['Mouse','Gs. 95.000','🖱️'],['Monitor','Gs. 1.350.000','🖥️'],['Notebook','Gs. 4.500.000','💻'],['Parlante','Gs. 280.000','🔊']];let cantidad=0;const contenedor=document.getElementById('productos'),boton=document.getElementById('mostrar');function mostrar(){datos.slice(cantidad,cantidad+3).forEach(p=>contenedor.insertAdjacentHTML('beforeend',`<div class="col-md-4"><article class="card producto h-100"><div class="imagen">${p[2]}</div><div class="card-body"><h2 class="h5">${p[0]}</h2><p class="fw-bold text-primary">${p[1]}</p><button class="btn btn-outline-primary w-100" onclick="alert('Producto seleccionado: ${p[0]}')">Ver detalle</button></div></article></div>`));cantidad+=3;if(cantidad>=datos.length)boton.classList.add('d-none')}boton.addEventListener('click',mostrar);mostrar();</script></body></html>
