<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Calculadora Web</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><style>body{min-height:100vh;background:linear-gradient(135deg,#eef2ff,#faf5ff);display:grid;place-items:center}.calculadora{max-width:560px;border:0;border-radius:22px;box-shadow:0 18px 55px rgba(31,41,55,.16)}.btn{min-width:110px}</style></head><body><main class="container py-5"><section class="calculadora bg-white p-4 p-md-5 mx-auto"><h1 class="h2 text-center mb-4">Calculadora Básica</h1><div class="mb-3"><label class="form-label" for="numero1">Primer número</label><input class="form-control" type="number" id="numero1"></div><div class="mb-4"><label class="form-label" for="numero2">Segundo número</label><input class="form-control" type="number" id="numero2"></div><div class="d-flex flex-wrap gap-2 justify-content-center mb-4"><button class="btn btn-primary" onclick="calcular('+')">Sumar</button><button class="btn btn-success" onclick="calcular('-')">Restar</button><button class="btn btn-warning" onclick="calcular('*')">Multiplicar</button><button class="btn btn-danger" onclick="calcular('/')">Dividir</button></div><label class="form-label" for="resultado">Resultado</label><input class="form-control fw-bold" id="resultado" readonly><a class="btn btn-outline-secondary w-100 mt-4" href="../../index.html#proyectos">Volver al portafolio</a></section></main><script>function calcular(op){const n1=parseFloat(document.getElementById('numero1').value),n2=parseFloat(document.getElementById('numero2').value),r=document.getElementById('resultado');if(Number.isNaN(n1)||Number.isNaN(n2)){r.value='Ingrese ambos números';return}if(op==='/'&&n2===0){r.value='No se puede dividir entre cero';return}const valores={'+':n1+n2,'-':n1-n2,'*':n1*n2,'/':n1/n2};r.value=valores[op]}</script></body></html>
